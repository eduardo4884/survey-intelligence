// ─── Gemini Flash API ─────────────────────────────────────────
async function callGemini(msgs, sysprompt, maxTokens=700, imgData=null) {
  const apiKey = db.graw(K.apikey);
  if (!apiKey) return { message:'⚠️ Configura a Gemini API key na aba ⚙️ API.', error:true };
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
  const contents = msgs.map(m => ({
    role: (m.role==='assistant'||m.role==='model') ? 'model' : 'user',
    parts: [{ text: m.content || m.text || '' }]
  }));
  if (imgData) {
    const lastUser = [...contents].reverse().find(c=>c.role==='user');
    if (lastUser) lastUser.parts = [
      { inline_data:{ mime_type:imgData.mimeType, data:imgData.data } },
      ...lastUser.parts
    ];
  }
  const body = {
    system_instruction: { parts:[{ text:sysprompt }] },
    contents,
    generationConfig: { maxOutputTokens:maxTokens, temperature:0.3 }
  };
  try {
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||`HTTP ${res.status}`); }
    const data = await res.json();
    const raw = (data.candidates?.[0]?.content?.parts?.[0]?.text||'')
      .replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/i,'').trim();
    try { return JSON.parse(raw); } catch { return { message:raw }; }
  } catch(e) { return { message:`Erro: ${e.message}`, error:true }; }
}

// ─── Claude API (usado no artifact) ──────────────────────────
async function callClaude(msgs, sysprompt, maxTokens=700, imgData=null) {
  const messages = msgs.map(m => {
    if (imgData && m === msgs[msgs.length-1] && m.role==='user') {
      return { role:'user', content:[
        { type:'image', source:{ type:'base64', media_type:imgData.mimeType, data:imgData.data }},
        { type:'text',  text: m.content || m.text || '' }
      ]};
    }
    return { role: m.role==='model'?'assistant':m.role, content: m.content || m.text || '' };
  });
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:maxTokens, system:sysprompt, messages })
  });
  const data = await res.json();
  const raw = (data.content?.[0]?.text||'').replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/i,'').trim();
  try { return JSON.parse(raw); } catch { return { message:raw }; }
}

// ─── Router: Claude no artifact, Gemini no GitHub ────────────
async function callAI(msgs, sysprompt, maxTokens=700, imgData=null) {
  if (IS_CLAUDE) return callClaude(msgs, sysprompt, maxTokens, imgData);
  return callGemini(msgs, sysprompt, maxTokens, imgData);
}

// ─── Helpers ──────────────────────────────────────────────────
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}
function fmt(v) {
  if(v==null) return '—';
  if(Array.isArray(v)) return v.length?v.map(x=>typeof x==='object'?JSON.stringify(x):x).join(', '):'—';
  if(typeof v==='boolean') return v?'Sim ✓':'Não ✗';
  if(typeof v==='object') return Object.entries(v).map(([k,vv])=>`${k}: ${fmt(vv)}`).join(' · ');
  return String(v);
}
function deepMerge(base, patch) {
  if(!patch||typeof patch!=='object') return base;
  const r={...base};
  for(const k of Object.keys(patch)){
    const pv=patch[k];
    if(pv==null) continue;
    if(Array.isArray(pv)) r[k]=pv.length?pv:(base[k]||[]);
    else if(typeof pv==='object') r[k]=deepMerge(base[k]||{},pv);
    else r[k]=pv;
  }
  return r;
}

  // cronómetro

  const timerRef = useRef(null);
  // chat

  const [chatLoad,setChatLoad]=useState(false);
  const [chatReady,setChatReady]=useState(false);
  const bottomRef = useRef(null);
  // api key

  useEffect(()=>{

  },[messages,chatLoad]);

  useEffect(()=>{
    (async()=>{
      const sp=await db.get(K.profile); if(sp) setProfile(sp); else await db.set(K.profile,EDGAR);
      const sc=await db.get(K.chat);    if(sc?.length){setMessages(sc);setChatReady(true);}else initChat(sp||EDGAR);
      const ss=await db.get(K.sessions);if(ss?.length) setSessions(ss);
      const ak=db.graw(K.apikey); if(ak) setApiKey(ak);
    })();
  },[]);

  useEffect(()=>{
    if(tActive&&tSecs>0){ timerRef.current=setInterval(()=>setTSecs(s=>s>0?s-1:0),1000); }
    else { clearInterval(timerRef.current); }
    return ()=>clearInterval(timerRef.current);
  },[tActive,tSecs]);

  const saveApiKey = (k) => { db.sraw(K.apikey,k.trim()); setApiKey(k.trim()); setView('validar'); };

  const initChat = async(p) => {
    const w={role:'assistant',text:'Olá Edgar! 👋\n\nPerfil completo ✅ Sistema pronto.\n\nUsa a aba 🔍 Validar para validar cada pergunta antes de submeter.\n\nComo posso ajudar?'};
    setMessages([w]); await db.set(K.chat,[w]); setChatReady(true);
  };

  const startSession = (mode) => setSessionSetup({mode});

  const confirmSession = (mode,dur,pay,site) => {
    const s={id:genId(),ts:Date.now(),mode,site:site||'',
      durMinutes:parseFloat(dur)||0, payment:parseFloat(pay)||0, entries:[]};
    setActiveSession(s);
    if(s.durMinutes>0){ setTSecs(Math.round(s.durMinutes*60)); setTActive(true); }
    setSessionSetup(null); setVResult(null); setVQ(''); setVA('');
  };

  const updateSession = (upd) => {
    setActiveSession(upd);
    const ns=sessions.find(s=>s.id===upd.id)?sessions.map(s=>s.id===upd.id?upd:s):[upd,...sessions];
    setSessions(ns); db.set(K.sessions,ns);
  };

  // ── Leitura de imagem

    setImgLoad(true); setVResult(null); setSugNote(''); setSugLang('');
    setImgResult(null); setSugExtra(null);
    try {
      const b64 = await new Promise((res,rej)=>{

        r.onerror=rej; r.readAsDataURL(file);
      });
      setImgPrev(`data:${file.type};base64,${b64}`);

    if(!vQ.trim()||sugLoad) return;

    try {
      const hist=activeSession?.entries?.map(e=>({q:e.q,a:e.a}))||[];

      if(p.error) {
        setSugNote(p.message||'Erro na API. Verifica a tua key na aba ⚙️ API.');
        setSugLoad(false); return;
      }
      if(p.resposta)        setVA(p.resposta);
      if(p.justificacao)    setSugNote(p.justificacao);
      if(p.idioma_pergunta) setSugLang(p.idioma_pergunta);
      if(p.zona_segura||p.evitar||p.confianca)
        setSugExtra({zona_segura:p.zona_segura,evitar:p.evitar,confianca:p.confianca});
    } catch(e) {
      setSugNote('Erro de ligação. Verifica a tua API key na aba ⚙️ API.');
    }

  };

  // ── Validar
  const validate = async() => {
    if(!vQ.trim()||!vA.trim()||vLoad) return;
    setVLoad(true); setVResult(null);
    try {
      const hist=activeSession?.entries?.map(e=>({q:e.q,a:e.a}))||[];
      const p=await callAI([{role:'user',content:`PERGUNTA: "${vQ.trim()}"\nMINHA RESPOSTA: "${vA.trim()}"`}],VALIDATOR_SYS(profile,hist));
      if(p.error) {
        setVResult({status:'amarelo',analise:p.message||'Erro na API. Configura a key na aba ⚙️ API.',validado:false});
      } else {
        setVResult(p);
      }
    } catch { setVResult({status:'amarelo',analise:'Erro de ligação. Verifica a tua API key na aba ⚙️ API.',validado:false}); }
    setVLoad(false);
  };

  // ── Confirmar entrada
  const confirmEntry = () => {
    if(!vResult||!activeSession) return;
    const entry={id:genId(),q:vQ.trim(),a:vA.trim(),result:vResult,ts:Date.now()};
    const upd={...activeSession,entries:[...activeSession.entries,entry]};
    updateSession(upd);
    setVQ(''); setVA(''); setVResult(null); setSugNote(''); setSugLang(''); setImgPrev(null); setImgResult(null); setSugExtra(null);
  };

  // ── Relatório
  const genReport = async() => {
    if(!activeSession?.entries?.length) return;
    setRepLoad(true);
    try {
      const txt=activeSession.entries.map((e,i)=>`Q${i+1}:"${e.q}"→"${e.a}"[${e.result?.status||'?'}]`).join('\n');
      const p=await callAI([{role:'user',content:`Sessão:\n${txt}`}],REPORT_SYS(profile),500);
      setReport(p); setShowRep(true);
    } catch { setReport({score_geral:0,titulo:'Erro',resumo:'Não foi possível gerar.',pontos_fortes:[],pontos_risco:[],sugestao_proxima:''}); setShowRep(true); }
    setRepLoad(false);
  };

  // ── Chat
  const sendChat = useCallback(async()=>{
    const text=chatIn.trim(); if(!text||chatLoad) return;
    setChatIn('');
    const uMsg={role:'user',text};
    const next=[...messages,uMsg]; setMessages(next); setChatLoad(true);
    try {
      const hist=next.map(m=>({role:m.role,content:m.text}));
      const p=await callAI(hist,CHAT_SYS(profile));
      const aMsg={role:'assistant',text:p.message||p,section:p.section||''};
      const final=[...next,aMsg]; setMessages(final); await db.set(K.chat,final);
    } catch { setMessages([...next,{role:'assistant',text:'Erro. Tenta novamente.'}]); }
    setChatLoad(false);
  },[chatIn,chatLoad,messages,profile]);

  const onChatKey=(e)=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();} };

  const setResult = (res,field) => {
    const upd={...activeSession,resultado:res,tsEnd:Date.now()};
    if(field) upd[field]=res;
    clearInterval(timerRef.current); setTActive(false);
    updateSession(upd);
  };

  const resetAll = async() => {
    if(!confirm('Repor tudo?')) return;
    clearInterval(timerRef.current); setTActive(false); setTSecs(0);
    await db.set(K.profile,EDGAR); await db.del(K.chat); await db.del(K.sessions);
    setProfile(EDGAR); setMessages([]); setSessions([]); setActiveSession(null);
    setChatReady(false); await initChat(EDGAR);
  };

  // ══════════ RENDER ══════════
  return (
    <div style={S.root}>
      {/* Header */}
      <div style={S.header}>
        <div>
          <div style={S.htitle}>Survey Intelligence</div>
          <div style={S.hsub}>Sistema de Maximização · Edgar</div>
        </div>
        <div style={S.hbadge}>✅ 100%</div>
      </div>

      {/* Tabs */}
      <div style={{...S.tabs,overflowX:'auto',scrollbarWidth:'none'}}>
        {[{id:'validar',i:'🔍',l:'Validar'},{id:'dash',i:'💰',l:'Ganhos'},
          {id:'perfil',i:'👤',l:'Perfil'},{id:'chat',i:'💬',l:'Chat'},
          {id:'api',i:'⚙️',l:'API'}].map(t=>(
          <button key={t.id} style={{...S.tab,flexShrink:0,minWidth:72,...(view===t.id?S.tabOn:{})}}
            onClick={()=>{setView(t.id);if(t.id!=='validar')setVResult(null);}}>
            {t.i} {t.l}
          </button>
        ))}
      </div>

      {/* ══ VALIDAR ══ */}
      {view==='validar' && (
        <div style={S.scroll}>
          {!activeSession && (
            <>
              <div style={S.infoBox}>
                <div style={S.infoTitle}>🔍 Como funciona</div>
                <div style={S.infoText}>Escolhe o modo, coloca cada pergunta e a tua resposta — o sistema valida <strong>antes</strong> de submeteres. Funciona na <strong>pré-triagem</strong> e na <strong>pesquisa ao vivo</strong>.</div>
              </div>
              <div style={{display:'flex',gap:10,marginBottom:14}}>
                <ModeBtn icon='📋' label='Pré-Triagem' sub='Antes de entrar' onClick={()=>startSession('pretriagem')}/>
                <ModeBtn icon='📡' label='Ao Vivo' sub='Durante a pesquisa' onClick={()=>startSession('live')}/>
              </div>
              {sessionSetup && <SessionSetup mode={sessionSetup.mode} onConfirm={confirmSession} onCancel={()=>setSessionSetup(null)}/>}
              {sessions.length>0&&<>
                <div style={S.divLabel}>Sessões anteriores</div>
                {sessions.map(s=>(
                  <div key={s.id} style={{...S.card,cursor:'pointer'}} onClick={()=>setActiveSession(s)}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div style={{fontSize:13,color:'#ccc',fontWeight:'bold'}}>
                          {s.mode==='pretriagem'?'📋 Pré-Triagem':s.resultado_pretriagem?'🔄 Pré→Vivo':'📡 Ao Vivo'}
                          {s.site?' · '+s.site:''}
                        </div>
                        <div style={{fontSize:11,color:'#445',marginTop:3}}>
                          {fmtDate(s.ts)} · {s.entries.length} perguntas
                          {s.resultado&&<span style={{marginLeft:8,color:s.resultado==='aprovado'?'#4ade80':'#f87171'}}>
                            {s.resultado==='aprovado'?'· ✅ Aprovado':'· ❌ Desqualif.'}
                          </span>}
                        </div>
                      </div>
                      <SessionScore entries={s.entries}/>
                    </div>
                  </div>
                ))}
              </>}
            </>
          )}

          {activeSession && <>
            {activeSession.durMinutes>0&&<SurveyTimer secs={tSecs} active={tActive}
              totalSecs={Math.round(activeSession.durMinutes*60)}
              payment={activeSession.payment} entries={activeSession.entries}
              onToggle={()=>setTActive(a=>!a)}/>}

            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <button onClick={()=>setActiveSession(null)} style={S.backBtn}>← Sessões</button>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:'#d4a853',fontWeight:'bold'}}>
                  {activeSession.mode==='pretriagem'?'📋 Pré-Triagem':'📡 Pesquisa ao Vivo'}
                  {activeSession.site?' · '+activeSession.site:''}
                </div>
                <div style={{fontSize:11,color:'#445'}}>{activeSession.entries.length} perguntas</div>
              </div>
              <SessionScore entries={activeSession.entries}/>
              {/* Botão cancelar sessão */}
              <button
                onClick={()=>{
                  if(activeSession.entries.length===0||confirm('Cancelar esta sessão?')){
                    clearInterval(timerRef.current); setTActive(false); setTSecs(0);
                    setActiveSession(null); setVQ(''); setVA(''); setVResult(null);
                    setSugNote(''); setSugLang(''); setImgPrev(null);
                  }
                }}
                style={{background:'#1a0a0a',border:'1px solid #3a1010',borderRadius:6,
                  color:'#f87171',fontSize:11,cursor:'pointer',padding:'4px 8px',
                  fontFamily:'inherit',flexShrink:0}}>
                ✕ Cancelar
              </button>
            </div>

            {activeSession.entries.length>0&&<RiskBar entries={activeSession.entries}/>}

            {/* Formulário */}
            <div style={S.card}>
              {/* Atalhos */}
              <div style={{marginBottom:12}}>
                <div style={{fontSize:10,color:'#445',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:7}}>⚡ Atalhos rápidos</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                  {QUICK.map(qa=>(
                    <button key={qa.l} style={{fontSize:10,background:'#13131f',border:'1px solid #22223a',
                      color:'#aaa',padding:'3px 9px',borderRadius:20,cursor:'pointer',fontFamily:'inherit'}}
                      onClick={()=>{setVQ(qa.q);setVA(qa.a);setVResult(null);setSugNote('');setSugLang('');setImgPrev(null);}}>
                      {qa.l}
                    </button>
                  ))}
                </div>
              </div>

              {/* Pergunta + botão foto */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                <label style={{...S.lbl,marginBottom:0}}>Pergunta #{activeSession.entries.length+1}</label>
                <div style={{position:'relative',overflow:'hidden',display:'inline-block',borderRadius:8}}>
                  <div style={{fontSize:11,background:'#0a1a2a',border:'1px solid #1a3a5a',
                    color:imgLoad?'#445':'#60a5fa',padding:'5px 12px',
                    pointerEvents:'none',whiteSpace:'nowrap',borderRadius:8}}>
                    {imgLoad?'🔍 A ler...':'📷 Foto / Galeria'}
                  </div>
                  <input type='file' accept='image/*' disabled={imgLoad}
                    onChange={e=>{if(e.target.files?.[0])readImage(e.target.files[0]);e.target.value='';}}
                    style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',opacity:0,cursor:'pointer',fontSize:0}}/>
                </div>
              </div>

              {imgPrev&&(
                <div style={{marginBottom:8,position:'relative'}}>
                  <img src={imgPrev} alt='prev' style={{width:'100%',borderRadius:8,border:'1px solid #1c2a3a',maxHeight:130,objectFit:'cover',objectPosition:'top'}}/>
                  <button onClick={()=>setImgPrev(null)} style={{position:'absolute',top:4,right:4,background:'rgba(0,0,0,0.7)',border:'none',color:'#fff',borderRadius:'50%',width:22,height:22,cursor:'pointer',fontSize:12}}>✕</button>
                </div>
              )}

              <textarea style={{...S.tarea,minHeight:72}} value={vQ}
                onChange={e=>{setVQ(e.target.value);setVResult(null);setSugNote('');setSugLang('');setImgPrev(null);}}
                placeholder='Cola, escreve ou usa 📷 para fotografar a pergunta...'/>

              <button style={{...S.btnSuggest,opacity:vQ.trim()&&!sugLoad&&!vLoad?1:0.4,marginTop:8}}
                onClick={suggest} disabled={!vQ.trim()||sugLoad||vLoad}>
                {sugLoad?'A sugerir...':'✨ Sugerir resposta ideal'}
              </button>

              {sugNote&&<SugExtra data={sugExtra} lang={sugLang} note={sugNote}/>}

              {/* Resultado estruturado da imagem */}
              {imgResult&&<ImageResult result={imgResult}
                onSelectMatrixAnswer={v=>setVA(v)}/>}

              <label style={{...S.lbl,marginTop:12}}>A minha resposta</label>
              <textarea style={{...S.tarea,minHeight:56}} value={vA}
                onChange={e=>{setVA(e.target.value);setVResult(null);}}
                placeholder='A resposta que pretendes dar...'/>

              <button style={{...S.btnGold,width:'100%',marginTop:12,padding:'12px',
                opacity:vQ.trim()&&vA.trim()&&!vLoad?1:0.4}}
                onClick={validate} disabled={!vQ.trim()||!vA.trim()||vLoad}>
                {vLoad?'A validar...':'🔍 Validar Resposta'}
              </button>
            </div>

            {vResult&&<ValidationResult result={vResult} onConfirm={confirmEntry} onEdit={()=>setVResult(null)}/>}

            {activeSession.entries.length>0&&<>
              <div style={{...S.divLabel,display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
                <span>Esta sessão</span>
                <button style={{...S.btn,...S.btnGold,fontSize:11,padding:'4px 12px',opacity:repLoad?0.5:1}}
                  onClick={genReport} disabled={repLoad}>{repLoad?'...':'📊 Relatório'}</button>
              </div>
              {[...activeSession.entries].reverse().map((e,i)=>(
                <EntryCard key={e.id} entry={e} num={activeSession.entries.length-i}/>
              ))}

              {activeSession.mode==='pretriagem'&&!activeSession.resultado&&(
                <div style={{background:'#0a1a0a',border:'1px solid #1a4018',borderRadius:10,padding:'12px 14px',marginTop:6,marginBottom:10}}>
                  <div style={{fontSize:12,color:'#4ade80',fontWeight:'bold',marginBottom:8}}>Resultado da pré-triagem?</div>
                  <div style={{display:'flex',gap:8}}>
                    <button style={{...S.btn,flex:1,background:'#0a2010',border:'1px solid #1a4018',color:'#4ade80',fontSize:12}}
                      onClick={()=>updateSession({...activeSession,mode:'live',resultado_pretriagem:'aprovado'})}>
                      ✅ Passei → Continuar
                    </button>
                    <button style={{...S.btn,flex:1,background:'#1a0a0a',border:'1px solid #3a1010',color:'#f87171',fontSize:12}}
                      onClick={()=>updateSession({...activeSession,resultado:'desqualificado',resultado_pretriagem:'desqualificado'})}>
                      ❌ Desqualificado
                    </button>
                  </div>
                </div>
              )}

              {activeSession.mode==='live'&&!activeSession.resultado&&(
                <div style={{background:'#0c0c1c',border:'1px solid #2a2a3a',borderRadius:10,padding:'12px 14px',marginTop:6,marginBottom:10}}>
                  <div style={{fontSize:12,color:'#ccc',fontWeight:'bold',marginBottom:8}}>Como terminou?</div>
                  <div style={{display:'flex',gap:8}}>
                    <button style={{...S.btn,flex:1,background:'#0a2010',border:'1px solid #1a4018',color:'#4ade80',fontSize:12}}
                      onClick={()=>{ clearInterval(timerRef.current); setTActive(false); updateSession({...activeSession,resultado:'aprovado',tsEnd:Date.now()}); }}>
                      ✅ Aprovado & Pago
                    </button>
                    <button style={{...S.btn,flex:1,background:'#1a0a0a',border:'1px solid #3a1010',color:'#f87171',fontSize:12}}
                      onClick={()=>{ clearInterval(timerRef.current); setTActive(false); updateSession({...activeSession,resultado:'desqualificado',tsEnd:Date.now()}); }}>
                      ❌ Desqualificado
                    </button>
                  </div>
                </div>
              )}

              {activeSession.resultado&&(
                <div style={{textAlign:'center',padding:'10px',fontSize:13,fontWeight:'bold',
                  color:activeSession.resultado==='aprovado'?'#4ade80':'#f87171'}}>
                  {activeSession.resultado==='aprovado'?'✅ Concluída com sucesso':'❌ Desqualificado'}
                </div>
              )}
            </>}
            <div style={{height:30}}/>
          </>}
        </div>
      )}

      {/* ══ GANHOS ══ */}
      {view==='dash'&&<DashboardView sessions={sessions}/>}

      {/* ══ PERFIL ══ */}
      {view==='perfil'&&<ProfileView profile={profile} reset={resetAll}/>}

      {/* ══ API ══ */}
      {view==='api'&&<ApiView apiKey={apiKey} onSave={saveApiKey}/>}

      {/* ══ CHAT ══ */}
      {view==='chat'&&(
        <div style={S.chatWrap}>
          <div style={S.chatScroll}>
            {!chatReady&&<Dots/>}
            {messages.map((m,i)=>(
              <div key={i} style={m.role==='user'?S.rowUser:S.rowAI}>
                {m.role==='assistant'&&<div style={S.aiAv}>AI</div>}
                <div style={m.role==='user'?S.bUser:S.bAI}>
                  {m.section&&<div style={S.stag}>{m.section}</div>}
                  <div style={S.btxt}>{m.text}</div>
                </div>
              </div>
            ))}
            {chatLoad&&<div style={S.rowAI}><div style={S.aiAv}>AI</div><div style={S.bAI}><Dots/></div></div>}
            <div ref={bottomRef}/>
          </div>
          <div style={S.inputArea}>
            <textarea style={S.inputBox} value={chatIn}
              onChange={e=>setChatIn(e.target.value)} onKeyDown={onChatKey}
              placeholder='Pergunta ou dúvida...' rows={1} disabled={chatLoad||!chatReady}/>
            <button style={{...S.sendBtn,opacity:chatIn.trim()&&!chatLoad?1:0.4}}
              onClick={sendChat} disabled={!chatIn.trim()||chatLoad}>↑</button>
          </div>
        </div>
      )}

      {/* ══ MODAL RELATÓRIO ══ */}
      {showRep&&report&&<ReportModal report={report} onClose={()=>setShowRep(false)}/>}
    </div>
  );
}

// ─── API View (aba dedicada) ──────────────────────────────────
function ApiView({ apiKey, onSave }) {
  const [k, setK] = useState(apiKey||'');
  const [saved, setSaved] = useState(false);
  const save = () => { if(!k.trim()) return; onSave(k.trim()); setSaved(true); setTimeout(()=>setSaved(false),2000); };
  const hasKey = !!apiKey;
  return (
    <div style={S.scroll}>
      {/* Status */}
      <div style={{background:hasKey?'#091a09':'#1a0909',border:`1px solid ${hasKey?'#1a4018':'#3a1010'}`,
        borderRadius:10,padding:'14px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:12}}>
        <div style={{fontSize:28}}>{hasKey?'✅':'⚠️'}</div>
        <div>
          <div style={{fontSize:13,fontWeight:'bold',color:hasKey?'#4ade80':'#f87171',marginBottom:3}}>
            {hasKey?'API Configurada':'API Não Configurada'}
          </div>
          <div style={{fontSize:11,color:'#667',lineHeight:1.5}}>
            {hasKey?`Key activa: ${apiKey.slice(0,8)}${'•'.repeat(12)}`:'O sistema não funciona sem uma API key válida.'}
          </div>
        </div>
      </div>

      {/* Como obter */}
      <div style={{background:'#0a1020',border:'1px solid #1a2a3a',borderRadius:10,padding:'14px 16px',marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:'bold',color:'#60a5fa',marginBottom:10}}>📋 Como obter a Gemini API Key (grátis)</div>
        {[
          '1. Vai a aistudio.google.com no browser',
          '2. Faz login com a tua conta Google',
          '3. Clica em "Get API key" → "Create API key"',
          '4. Copia a key gerada (começa com AIzaSy...)',
          '5. Cola aqui em baixo e guarda',
        ].map((s,i)=>(
          <div key={i} style={{fontSize:12,color:'#889',lineHeight:1.7,padding:'2px 0'}}>{s}</div>
        ))}
        <div style={{fontSize:11,color:'#4ade80',marginTop:8}}>
          ✅ Gratuito · 1.500 req/dia · Sem cartão de crédito · Funciona em Angola
        </div>
      </div>

      {/* Input da key */}
      <div style={S.card}>
        <label style={S.lbl}>Gemini API Key</label>
        <input style={{...S.inp,marginBottom:8,letterSpacing:'0.04em'}}
          type='password' placeholder='AIzaSy...'
          value={k} onChange={e=>{setK(e.target.value);setSaved(false);}}/>
        <div style={{fontSize:10,color:'#445',marginBottom:14,lineHeight:1.5}}>
          A key é guardada localmente no teu dispositivo — nunca é enviada para outros servidores.
        </div>
        <button style={{...S.btn,...S.btnGold,width:'100%',padding:'12px',
          opacity:k.trim()&&k!==apiKey?1:saved?1:0.4}}
          onClick={save} disabled={!k.trim()}>
          {saved?'✅ Guardado!':hasKey?'Actualizar API Key':'Guardar API Key'}
        </button>
      </div>

      {/* Modelos suportados */}
      <div style={S.card}>
        <div style={{fontSize:11,color:'#445',letterSpacing:'0.08em',marginBottom:10}}>MODELO EM USO</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0'}}>
          <div>
            <div style={{fontSize:13,color:'#ccc',fontWeight:'bold'}}>Gemini 2.5 Flash</div>
            <div style={{fontSize:11,color:'#445',marginTop:2}}>Texto + Imagem · 250 req/dia grátis · Multilingue</div>
          </div>
          <span style={{fontSize:10,background:'#0d1e10',border:'1px solid #1a401e',color:'#4ade80',padding:'3px 8px',borderRadius:20}}>Activo</span>
        </div>
      </div>
      <div style={{height:30}}/>
    </div>
  );
}

// ─── Image Result — exibe resultado estruturado da imagem ─────
function ImageResult({ result, onSelectMatrixAnswer }) {
  if(!result) return null;
  const langBadge = result.idioma_detectado==='en'?'🇬🇧 EN':result.idioma_detectado==='fr'?'🇫🇷 FR':'🇵🇹 PT';
  return (
    <div style={{background:'#0a1020',border:'1px solid #1a3a5a',borderRadius:10,
      padding:'12px 14px',marginBottom:10,animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:10,color:'#60a5fa',letterSpacing:'0.1em'}}>📷 IMAGEM ANALISADA</div>
        <div style={{display:'flex',gap:6}}>
          <span style={{fontSize:9,background:'#1a2a3a',border:'1px solid #2a3a4a',color:'#60a5fa',padding:'2px 7px',borderRadius:10}}>
            {result.tipo?.toUpperCase()||'?'}
          </span>
          <span style={{fontSize:9,background:'#1a2a3a',border:'1px solid #2a3a4a',color:'#d4a853',padding:'2px 7px',borderRadius:10}}>
            {langBadge}
          </span>
        </div>
      </div>

      {/* Opções visíveis na imagem */}
      {result.opcoes?.length>0&&(
        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,color:'#556',letterSpacing:'0.08em',marginBottom:6}}>OPÇÕES DETECTADAS</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {result.opcoes.map((op,i)=>{
              const isSuggested = op===result.opcao_a_assinalar||op===result.resposta_sugerida;
              return (
                <div key={i} style={{fontSize:12,padding:'4px 10px',borderRadius:6,cursor:'pointer',
                  background:isSuggested?'#0a2010':'#13131f',
                  border:`1px solid ${isSuggested?'#1a4018':'#22223a'}`,
                  color:isSuggested?'#4ade80':'#aaa',
                  fontWeight:isSuggested?'bold':'normal'}}
                  onClick={()=>onSelectMatrixAnswer&&onSelectMatrixAnswer(op)}>
                  {isSuggested&&'✓ '}{op}
                </div>
              );
            })}
          </div>
          {result.opcao_a_assinalar&&<div style={{fontSize:11,color:'#4ade80',marginTop:6}}>
            ↑ Assinala: <strong style={{color:'#4ade80'}}>{result.opcao_a_assinalar}</strong>
          </div>}
        </div>
      )}

      {/* Escala */}
      {result.escala&&(
        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,color:'#556',letterSpacing:'0.08em',marginBottom:6}}>ESCALA {result.escala.min}–{result.escala.max}</div>
          <div style={{display:'flex',gap:4}}>
            {Array.from({length:result.escala.max-result.escala.min+1},(_,i)=>i+result.escala.min).map(n=>{
              const isSug = String(n)===String(result.resposta_sugerida)||result.resposta_sugerida?.includes(String(n));
              return (
                <div key={n} style={{flex:1,textAlign:'center',padding:'6px 4px',borderRadius:6,
                  background:isSug?'#0a2010':'#13131f',
                  border:`1px solid ${isSug?'#1a4018':'#22223a'}`,
                  color:isSug?'#4ade80':'#667',
                  fontWeight:isSug?'bold':'normal',cursor:'pointer',fontSize:13}}
                  onClick={()=>onSelectMatrixAnswer&&onSelectMatrixAnswer(String(n))}>
                  {n}{isSug&&<div style={{fontSize:8,color:'#4ade80'}}>✓</div>}
                </div>
              );
            })}

// ─── Survey Timer ─────────────────────────────────────────────
function SurveyTimer({ secs, active, totalSecs, payment, entries, onToggle }) {
  const mins=Math.floor(secs/60), ss=String(secs%60).padStart(2,'0');
  const pct=totalSecs?Math.max(0,Math.round((secs/totalSecs)*100)):0;
  const elapsed=totalSecs-secs;
  const perQ=entries.length>0?Math.round(elapsed/entries.length):0;
  const hourly=elapsed>0&&payment>0?(payment/(elapsed/3600)).toFixed(2):null;
  const barColor=pct>40?'#4ade80':pct>20?'#f59e0b':'#f87171';
  const urgent=pct<=20;

  // ── Ritmo: tempo ideal por pergunta
  // Pesquisas pedem ~30s a 90s por resposta. Abaixo de 20s é suspeito.
  const rhythmAlert = perQ>0 && perQ<20
    ? { msg:'⚡ Demasiado rápido! Plataformas bloqueiam respostas abaixo de ~20s/pergunta', c:'#f87171', bg:'#1a0a0a', border:'#3a1010' }
    : perQ>=20 && perQ<35
    ? { msg:'🟡 Ritmo aceitável mas considera ser mais pausado para evitar suspensão', c:'#f59e0b', bg:'#1a1200', border:'#3a2a00' }
    : perQ>=35 && perQ<=120
    ? { msg:'✅ Ritmo ideal — as plataformas valorizam este tempo de resposta', c:'#4ade80', bg:'#091a09', border:'#1a4018' }
    : perQ>120
    ? { msg:'🐢 Demasiado lento — podes perder a sessão por inactividade', c:'#f59e0b', bg:'#1a1200', border:'#3a2a00' }
    : null;

  return (
    <div style={{background:urgent?'#1a0a0a':'#0a0f1a',border:`1px solid ${urgent?'#4a1010':'#1a2a3a'}`,borderRadius:10,padding:'10px 14px',marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
        <div style={{display:'flex',alignItems:'baseline',gap:4}}>
          <span style={{fontSize:22,fontWeight:'bold',color:barColor,fontFamily:'monospace'}}>{mins}:{ss}</span>
          <span style={{fontSize:10,color:'#445'}}>restante</span>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          {hourly&&<span style={{fontSize:11,color:'#d4a853'}}>${hourly}/h</span>}
          {perQ>0&&(
            <span style={{fontSize:10,color:
              perQ<20?'#f87171':perQ<35?'#f59e0b':perQ<=120?'#4ade80':'#f59e0b',
              fontWeight:'bold'}}>
              {perQ}s/Q
            </span>
          )}
          <button onClick={onToggle} style={{background:'none',border:'1px solid #2a2a3a',borderRadius:6,color:active?'#f87171':'#4ade80',fontSize:11,cursor:'pointer',padding:'3px 9px',fontFamily:'inherit'}}>
            {active?'⏸':'▶'}
          </button>
        </div>
      </div>
      <div style={{height:4,background:'#1a1a2e',borderRadius:2,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${pct}%`,background:barColor,transition:'width 1s linear',borderRadius:2}}/>
      </div>
      {/* Alerta de urgência */}
      {urgent&&<div style={{fontSize:10,color:'#f87171',marginTop:5}}>⚠️ Menos de 20% do tempo — acelera o ritmo</div>}
      {/* Alerta de ritmo por pergunta */}
      {rhythmAlert&&(
        <div style={{fontSize:10,color:rhythmAlert.c,background:rhythmAlert.bg,
          border:`1px solid ${rhythmAlert.border}`,borderRadius:6,
          padding:'5px 8px',marginTop:6,lineHeight:1.5}}>
          {rhythmAlert.msg}
        </div>
      )}
    </div>
  );
}

// ─── Risk Bar ─────────────────────────────────────────────────
function RiskBar({ entries }) {
  const total=entries.length,v=entries.filter(e=>e.result?.status==='verde').length,
    a=entries.filter(e=>e.result?.status==='amarelo').length,r=entries.filter(e=>e.result?.status==='vermelho').length;
  const rPct=total?Math.round(((a*0.5+r)/total)*100):0;
  const color=rPct<25?'#4ade80':rPct<55?'#f59e0b':'#f87171';
  return (
    <div style={{background:'#0e0e1c',border:'1px solid #1c1c2e',borderRadius:10,padding:'10px 14px',marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
        <span style={{fontSize:10,color:'#556',letterSpacing:'0.1em'}}>RISCO ACUMULADO</span>
        <span style={{fontSize:11,fontWeight:'bold',color}}>{rPct<25?'Baixo ✅':rPct<55?'Médio ⚠️':'Alto ❌'}</span>
      </div>
      <div style={{height:6,background:'#1a1a2e',borderRadius:3,overflow:'hidden',marginBottom:6}}>
        <div style={{height:'100%',width:`${rPct}%`,background:color,transition:'width .5s ease',borderRadius:3}}/>
      </div>
      <div style={{display:'flex',gap:12}}>
        {[{c:'#4ade80',l:'OK',n:v},{c:'#f59e0b',l:'Atenção',n:a},{c:'#f87171',l:'Risco',n:r}].map(i=>(
          <span key={i.l} style={{fontSize:11,color:i.c}}>{i.n} {i.l}</span>

  );
}

// ─── Dashboard ────────────────────────────────────────────────
function DashboardView({ sessions }) {
  const approved=sessions.filter(s=>s.resultado==='aprovado');
  const disq=sessions.filter(s=>s.resultado==='desqualificado');
  const pending=sessions.filter(s=>!s.resultado);
  const total=approved.reduce((acc,s)=>acc+(parseFloat(s.payment)||0),0);
  const rate=sessions.length?Math.round((approved.length/sessions.length)*100):0;
  const weekAgo=Date.now()-7*24*60*60*1000;
  const week=approved.filter(s=>s.ts>=weekAgo).reduce((acc,s)=>acc+(parseFloat(s.payment)||0),0);
  const now=new Date(), ms=new Date(now.getFullYear(),now.getMonth(),1).getTime();
  const month=approved.filter(s=>s.ts>=ms).reduce((acc,s)=>acc+(parseFloat(s.payment)||0),0);
  const hrs=approved.filter(s=>s.durMinutes>0&&s.payment>0).map(s=>parseFloat(s.payment)/parseFloat(s.durMinutes)*60);
  const avgH=hrs.length?(hrs.reduce((a,b)=>a+b,0)/hrs.length).toFixed(2):null;
  const byP={};
  approved.forEach(s=>{ const k=s.site||'Sem nome'; if(!byP[k]) byP[k]={e:0,c:0}; byP[k].e+=parseFloat(s.payment)||0; byP[k].c++; });
  return (
    <div style={S.scroll}>
      {sessions.length===0?(
        <div style={{textAlign:'center',padding:'60px 20px',color:'#445'}}>
          <div style={{fontSize:36,marginBottom:12}}>💰</div>
          <div style={{fontSize:14,color:'#556'}}>Nenhuma sessão ainda</div>
          <div style={{fontSize:12,color:'#334',marginTop:6}}>Completa a primeira pesquisa para ver os ganhos</div>
        </div>
      ):(
        <>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            <StatCard e='💵' l='Total ganho' v={`$${total.toFixed(2)}`} c='#4ade80'/>
            <StatCard e='📅' l='Este mês' v={`$${month.toFixed(2)}`} c='#d4a853'/>
            <StatCard e='📆' l='Esta semana' v={`$${week.toFixed(2)}`} c='#60a5fa'/>
            <StatCard e='🎯' l='Aprovação' v={`${rate}%`} c={rate>=70?'#4ade80':rate>=45?'#f59e0b':'#f87171'}/>
          </div>
          {avgH&&<div style={{background:'#0e0e1c',border:'1px solid #1c1c2e',borderRadius:10,padding:'12px 14px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:10,color:'#445',letterSpacing:'0.08em',marginBottom:3}}>TAXA MÉDIA/HORA</div>
              <div style={{fontSize:22,fontWeight:'bold',color:avgH>=8?'#4ade80':avgH>=4?'#f59e0b':'#f87171'}}>${avgH}/h</div>
            </div>
            <div style={{fontSize:11,color:avgH>=8?'#4ade80':avgH>=4?'#f59e0b':'#f87171'}}>{avgH>=8?'✅ Boa':avgH>=4?'⚠️ Aceitável':'❌ Baixa'}</div>
          </div>}
          <div style={{background:'#0e0e1c',border:'1px solid #1c1c2e',borderRadius:10,padding:'12px 14px',marginBottom:10}}>
            <div style={{fontSize:11,color:'#445',letterSpacing:'0.08em',marginBottom:8}}>SESSÕES</div>
            <div style={{display:'flex',gap:2,height:8,borderRadius:4,overflow:'hidden',marginBottom:8}}>
              {approved.length>0&&<div style={{flex:approved.length,background:'#22c55e'}}/>}
              {disq.length>0&&<div style={{flex:disq.length,background:'#ef4444'}}/>}
              {pending.length>0&&<div style={{flex:pending.length,background:'#334'}}/>}
            </div>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:11,color:'#4ade80'}}>✅ {approved.length}</span>
              <span style={{fontSize:11,color:'#f87171'}}>❌ {disq.length}</span>
              <span style={{fontSize:11,color:'#556'}}>⏳ {pending.length}</span>
            </div>
          </div>
          {Object.keys(byP).length>0&&<div style={{background:'#0e0e1c',border:'1px solid #1c1c2e',borderRadius:10,padding:'12px 14px',marginBottom:10}}>
            <div style={{fontSize:11,color:'#445',letterSpacing:'0.08em',marginBottom:8}}>POR PLATAFORMA</div>
            {Object.entries(byP).sort((a,b)=>b[1].e-a[1].e).map(([n,d])=>(
              <div key={n} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #111120'}}>
                <div><div style={{fontSize:13,color:'#ccc'}}>{n}</div><div style={{fontSize:10,color:'#445'}}>{d.c} pesquisas</div></div>
                <div style={{fontSize:14,fontWeight:'bold',color:'#4ade80'}}>${d.e.toFixed(2)}</div>
              </div>
            ))}
          </div>}
          <div style={S.divLabel}>Últimas sessões</div>
          {[...sessions].slice(0,10).map(s=>(
            <div key={s.id} style={{background:'#0e0e1c',border:'1px solid #1c1c2e',borderRadius:8,padding:'10px 14px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:12,color:'#ccc'}}>{s.site||'Sem plataforma'} · {s.entries?.length||0} perguntas</div>
                <div style={{fontSize:10,color:'#445',marginTop:3}}>{fmtDate(s.ts)}</div>
              </div>
              <div style={{textAlign:'right'}}>
                {s.payment>0&&s.resultado==='aprovado'&&<div style={{fontSize:13,fontWeight:'bold',color:'#4ade80'}}>+${parseFloat(s.payment).toFixed(2)}</div>}
                <div style={{fontSize:10,marginTop:2,color:s.resultado==='aprovado'?'#4ade80':s.resultado==='desqualificado'?'#f87171':'#556'}}>
                  {s.resultado==='aprovado'?'✅ Pago':s.resultado==='desqualificado'?'❌ Desqualif.':'⏳ Pendente'}
                </div>
              </div>
            </div>
          ))}
        </>
      )}
      <div style={{height:30}}/>
    </div>
  );
}
function StatCard({ e, l, v, c }) {
  return (
    <div style={{background:'#0e0e1c',border:'1px solid #1c1c2e',borderRadius:10,padding:'12px 14px'}}>
      <div style={{fontSize:18,marginBottom:4}}>{e}</div>
      <div style={{fontSize:10,color:'#445',letterSpacing:'0.08em',marginBottom:4}}>{l.toUpperCase()}</div>
      <div style={{fontSize:20,fontWeight:'bold',color:c}}>{v}</div>
    </div>
  );
}

// ─── Profile View ─────────────────────────────────────────────
function ProfileView({ profile, reset }) {
  const [open,setOpen]=useState(null);
  return (
    <div style={S.scroll}>
      <div style={{background:'linear-gradient(135deg,#1a1408,#0e0e1c)',border:'1px solid #38300e',borderRadius:14,padding:'18px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:14}}>
        <div style={{width:52,height:52,borderRadius:'50%',flexShrink:0,background:'linear-gradient(135deg,#d4a853,#8b6510)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:'bold',color:'#07070f'}}>E</div>
        <div style={{flex:1}}>
          <div style={{fontSize:19,fontWeight:'bold',color:'#f0e0b0'}}>Edgar</div>
          <div style={{fontSize:11,color:'#d4a853',marginTop:3}}>Cientista de Dados Sênior · Multinacional</div>
          <div style={{fontSize:11,color:'#556',marginTop:5}}>37 anos · Casado · Luanda, Angola 🇦🇴</div>
        </div>
        <div style={{textAlign:'center',padding:'8px 12px',background:'#0a1a0a',border:'1px solid #194018',borderRadius:10,flexShrink:0}}>
          <div style={{fontSize:22,fontWeight:'bold',color:'#4ade80'}}>100%</div>
          <div style={{fontSize:9,color:'#2a6030',letterSpacing:'0.1em',marginTop:2}}>perfil</div>
        </div>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
        {['🎓 Eng. Informática','💼 Multinacional','💰 Investidor','🚗 Sedan 2024','🏠 Casa Própria','✈️ 3 viagens/ano','📱 Android','🐾 2 cães+gato','🌍 PT/EN/FR'].map(c=>(
          <span key={c} style={{fontSize:11,background:'#111120',border:'1px solid #22223a',color:'#999',padding:'4px 10px',borderRadius:20}}>{c}</span>
        ))}
      </div>
      {/* Aviso marcas fictícias */}
      <div style={{background:'#1a0a0a',border:'1px solid #3a1010',borderRadius:10,padding:'12px 14px',marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:'bold',color:'#f87171',marginBottom:6}}>⚠️ Marcas Fictícias / Pegadinhas</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
          {(profile.consumo?.marcas_fictícias||[]).map(m=>(
            <span key={m} style={{fontSize:10,background:'#2a1010',border:'1px solid #4a1a1a',color:'#fca5a5',padding:'2px 7px',borderRadius:20}}>{m}</span>
          ))}
        </div>
      </div>
      {PSECS.map(sec=>{
        const isOpen=open===sec.key;
        const data=sec.keys.reduce((acc,k)=>{ const v=profile[k]; if(v!==undefined&&v!==null) acc[k]=v; return acc; },{});
        return (
          <div key={sec.key} style={S.card}>
            <div style={{...S.cardHead,cursor:'pointer',marginBottom:isOpen?8:0,paddingBottom:isOpen?8:0,borderBottom:isOpen?'1px solid #1c1c2e':'none'}}
              onClick={()=>setOpen(isOpen?null:sec.key)}>
              <span style={S.cardEmoji}>{sec.emoji}</span>
              <span style={S.cardLabel}>{sec.label}</span>
              <span style={{color:'#4ade80',fontSize:11,marginRight:6}}>✓</span>
              <span style={{color:'#445',fontSize:14}}>{isOpen?'▲':'▼'}</span>
            </div>
            {isOpen&&<div style={S.rows}>
              {Object.entries(data).map(([k,v])=>(
                <div key={k} style={S.row}>
                  <span style={S.rk}>{k.replace(/_/g,' ')}</span>
                  <span style={S.rv}>{fmt(v)}</span>
                </div>
              ))}
            </div>}
          </div>
        );
      })}
      <div style={{fontSize:11,color:'#334',textAlign:'center',margin:'16px 0 8px'}}>🔒 Dados guardados localmente.</div>
      <button style={{display:'block',margin:'0 auto 10px',background:'none',border:'1px solid #252535',color:'#445',fontSize:12,cursor:'pointer',padding:'6px 16px',borderRadius:8,fontFamily:'inherit'}}
        onClick={reset}>⟳ Repor tudo</button>
      <div style={{height:30}}/>
    </div>
  );
}

// ─── Dots ─────────────────────────────────────────────────────
function Dots() {
  return <div style={{display:'flex',gap:5,padding:'6px 0'}}>
    {[0,160,320].map(d=><span key={d} style={{width:6,height:6,borderRadius:'50%',background:'#d4a853',display:'inline-block',animation:'pulse 1.1s ease infinite',animationDelay:`${d}ms`}}/>)}
  </div>;
}
